name: Setup Python Environment
description: Install dependencies from requirements.txt

runs:
  using: composite
  steps:
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends git curl gnupg
        rm -rf /var/lib/apt/lists/*
      shell: bash

    - name: Upgrade pip
      run: python -m pip install --upgrade pip
      shell: bash

    - name: Cache pip dependencies
      uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
      with:
        path: /root/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('study_shoes_store/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Set CI environment defaults
      run: |
        # Required by python-decouple in settings.py during CI jobs.
        echo "SECRET_KEY=${SECRET_KEY:-ci-secret-key}" >> "$GITHUB_ENV"
      shell: bash

    - name: Install dependencies
      run: pip install -r study_shoes_store/requirements.txt
      shell: bash
